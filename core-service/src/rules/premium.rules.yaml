# ============================================================
# Premium computation rules — Health Retail (v2.0)
# Owned by: Core / Actuarial. Rate changes need actuarial cert.
# ============================================================
currency: INR
payment_frequency_options: [ANNUAL]   # monthly/EMI NOT supported in core v2
tenure_options_years: [1, 2, 3]
tenure_discount_pct: { "2": 7.5, "3": 10.0 }

# Annual base rate per member at SI 10,00,000 (rate table v9)
age_band_rates_adult:
  "18-35": 8200
  "36-45": 11400
  "46-55": 16800
  "56-65": 24500
child_rate: 3100

sum_insured_multiplier:
  "500000": 0.78
  "1000000": 1.00
  "2500000": 1.42
  "5000000": 1.85
  "10000000": 2.35

zone_loading:                          # derived from pincode prefix
  ZONE_A: 1.00                         # metro (1x, 4x pincode)
  ZONE_B: 0.90
  ZONE_C: 0.82

family_discount_pct: { "2": 5, "3_plus": 10 }

addons:                                # pct = of base premium, flat = INR
  POWER_BOOSTER:      { label: "Power Booster (super no-claim bonus up to 100%/yr)", pct: 12 }
  INFINITE_CARE:      { label: "Infinite Care (unlimited cover, one lifetime claim)", pct: 15 }
  JUMP_START:         { label: "Jump Start (PED waiting 36 -> 12 months)",           pct: 18 }
  OPD_PLUS:           { label: "OPD+ (cashless outpatient + teleconsults)",          flat: 4500 }
  INFLATION_PROTECT:  { label: "Inflation Protector (SI grows with CPI)",            pct: 5 }
  ROOM_UPGRADE:       { label: "Room Rent Waiver (any room category)",               pct: 8 }
  CLAIM_PROTECT:      { label: "Claim Protector (non-medical consumables)",          pct: 6 }

gst_pct: 18
