# ============================================================
# Premium computation rules — Health Retail (v2.0)
# Owned by: Core / Actuarial. Rate changes need actuarial cert.
# ============================================================
currency: INR
payment_frequency_options: [ANNUAL]   # monthly/EMI NOT supported in core v2
tenure_options_years: [1, 2, 3]
tenure_discount_pct: { "2": 7.5, "3": 10.0 }

# Annual base rate per member at SI 10,00,000 (rate table v9)
age_band_rates_adult:
  "18-35": 8200
  "36-45": 11400
  "46-55": 16800
  "56-65": 24500
child_rate: 3100

sum_insured_multiplier:
  "500000": 0.78
  "1000000": 1.00
  "2500000": 1.42
  "5000000": 1.85
  "10000000": 2.35

zone_loading:                          # derived from pincode prefix
  ZONE_A: 1.00                         # metro (1x, 4x pincode)
  ZONE_B: 0.90
  ZONE_C: 0.82

family_discount_pct: { "2": 5, "3_plus": 10 }

addons:                                # pct = of base premium, flat = INR
  BONUS_ACCELERATOR:    { label: "Bonus Accelerator (no-claim bonus grows up to 100%/yr)",     pct: 12 }
  LIMITLESS_SHIELD:     { label: "Limitless Shield (one unlimited lifetime claim)",            pct: 15 }
  EARLY_COVER:          { label: "Early Cover (PED waiting 36 -> 12 months)",                  pct: 18 }
  OPD_CARE:             { label: "OPD Care (cashless outpatient + teleconsults)",              flat: 4500 }
  COVER_ESCALATOR:      { label: "Cover Escalator (SI grows with inflation)",                  pct: 5 }
  ROOM_FLEX:            { label: "Room Flex (any room category, no rent capping)",             pct: 8 }
  CONSUMABLES_COVER:    { label: "Consumables Cover (non-medical consumables)",                pct: 6 }
  PRIORITY_MEMBERSHIP:  { label: "Priority Membership (dedicated support, priority claims)",   pct: 7 }
  ANNUAL_HEALTH_CHECK:  { label: "Annual Health Check (full body check-up every year)",        flat: 1200 }
  NON_PAYABLES_COVER:   { label: "Non-Payables Cover (pays the bill items most plans skip)",   pct: 10 }
  DAILY_HOSPITAL_CASH:  { label: "Daily Hospital Cash (fixed payout per day admitted)",         flat: 2500 }
  GLOBAL_ACCESS:        { label: "Global Access (planned or emergency treatment abroad)",      pct: 20 }
  ACCIDENT_SHIELD:      { label: "Accident Shield (lump sum for accidental death/disability)", flat: 1800 }
  WELLNESS_COMPANION:   { label: "Wellness Companion (mental health, nutrition, fitness)",     flat: 1500 }

# Plan tiers — pre-configured bundles, listed best-first. Each tier applies a
# rate multiplier to the base premium and bundles a set of add-ons; the rest of
# the differences are coverage terms (room category, ambulance limits, restore
# behaviour) documented per tier below and shown on the plan cards.
plan_variants:
  APEX:
    label: "Apex"
    tagline: "Our most complete cover — everything, from day one"
    rate_multiplier: 1.25
    recommended: true
    included_addons: [BONUS_ACCELERATOR, LIMITLESS_SHIELD, EARLY_COVER, ROOM_FLEX]
    benefits:
      - "Any hospital room — including suites, no rent caps"
      - "Evergreen Refill: sum insured restores after your first claim, for life"
      - "Age Freeze: premium locked to your entry age till a claim is paid"
      - "Boost Bank: unused cover carries forward, up to 10x your sum insured"
      - "PED waiting cut to 12 months — Early Cover included"
      - "Road ambulance up to sum insured; air ambulance up to Rs 5L"
      - "Advanced treatments (robotic surgery, oral chemo, stem-cell BMT) up to sum insured"
  PRIME:
    label: "Prime"
    tagline: "The sweet spot — flagship benefits at a friendlier price"
    rate_multiplier: 1.10
    included_addons: [BONUS_ACCELERATOR, LIMITLESS_SHIELD]
    benefits:
      - "Any hospital room except suites"
      - "Evergreen Refill: sum insured restores after your first claim, for life"
      - "Age Freeze: premium locked to your entry age till a claim is paid"
      - "Boost Bank: unused cover carries forward, up to 5x your sum insured"
      - "Road ambulance up to sum insured; air ambulance up to Rs 5L"
      - "Advanced treatments covered up to sum insured"
  CORE:
    label: "Core"
    tagline: "Strong essentials for growing families"
    rate_multiplier: 1.00
    included_addons: [BONUS_ACCELERATOR]
    benefits:
      - "Twin-sharing hospital room"
      - "Boost Bank: unused cover carries forward, up to 2x your sum insured"
      - "Road ambulance up to Rs 2,000 per hospitalisation"
      - "Advanced treatments up to Rs 1L per claim"
      - "PED waiting 36 months (add Early Cover to cut it to 12)"
  LITE:
    label: "Lite"
    tagline: "Honest baseline protection at the lowest price"
    rate_multiplier: 0.85
    included_addons: []
    benefits:
      - "General ward hospital room"
      - "Road ambulance up to Rs 2,000 per hospitalisation"
      - "Advanced treatments up to Rs 1L per claim"
      - "PED waiting 36 months (add Early Cover to cut it to 12)"

# Coverage every tier gets, regardless of add-ons — the "base" tiles in the
# policy discovery grid. No price: these are never optional.
common_benefits:
  - { code: TWO_HOUR_RULE,   icon: "⏱️", label: "2-Hour Rule",        tagline: "Admitted 2+ hours? You're covered.",              description: "Hospitalisation of 2+ hours is covered outright (24 hours at AYUSH hospitals)." }
  - { code: BEFORE_AFTER,    icon: "📅", label: "Before & After Care", tagline: "Cover starts before you're even admitted.",       description: "60 days of pre-hospitalisation and 180 days of post-hospitalisation expenses, on us." }
  - { code: CARE_AT_HOME,    icon: "🏠", label: "Care at Home",        tagline: "Some treatment doesn't need a hospital bed.",     description: "Doctor-advised treatment at home — including chemotherapy and dialysis — is covered like an admission." }
  - { code: DONOR_PROTECT,   icon: "❤️", label: "Donor Protect",       tagline: "Saving a life shouldn't cost you.",               description: "If you donate an organ, your own hospitalisation expenses for the procedure are covered." }
  - { code: SECOND_LOOK,     icon: "🩺", label: "Expert Second Look",  tagline: "A second opinion, on the house.",                  description: "Unlimited second medical opinions from our specialist network, whenever you want one." }
  - { code: MOVE_MORE,       icon: "🚶", label: "Move More",           tagline: "Walk more, pay less.",                            description: "Your activity score can knock up to 30% off your renewal premium — synced from your phone." }

gst_pct: 18
